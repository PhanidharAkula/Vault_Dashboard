<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Vault — Loan Intelligence</title>
    <script>
      // Read persisted theme before React boots so we don't flash the wrong palette.
      // `?theme=dark|light` overrides storage (handy for sharing a screenshot).
      try {
        var u = new URL(location).searchParams.get('theme')
        var t = u || localStorage.getItem('vault.theme')
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
