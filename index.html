<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <title>Vault Intelligence</title>
    <script>
      // Read persisted theme + currency before React boots. URL params override
      // localStorage (handy for sharing a screenshot or testing).
      try {
        var params = new URL(location).searchParams
        var t = params.get('theme') || localStorage.getItem('vault.theme')
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
        var c = params.get('currency')
        if (c === 'INR' || c === 'USD') localStorage.setItem('vault.currency', c)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
