<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!-- Paint Safari's URL bar / bottom toolbar / iOS status bar with the
         page's background colour so the chrome blends into the content
         instead of showing its own translucent overlay over the scroll
         edges. Variants flip with the active theme. -->
    <meta name="theme-color" content="#f7f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#07080d" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Vault Intelligence</title>
    <script>
      // Read persisted theme + currency before React boots. URL params override
      // localStorage (handy for sharing a screenshot or testing).
      try {
        var params = new URL(location).searchParams
        var t = params.get('theme') || localStorage.getItem('vault.theme')
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
        var c = params.get('currency')
        if (c === 'INR' || c === 'USD') localStorage.setItem('vault.currency', c)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
