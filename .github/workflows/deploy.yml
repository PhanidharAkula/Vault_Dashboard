name: Deploy to GitHub Pages

on:
  # Run on every push to main…
  push:
    branches: [main]
  # …or whenever you trigger it manually from the Actions tab.
  workflow_dispatch:

# Pages deployment requires these specific permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run two deploys at once; cancel the old one if a new push comes in.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
